name: Auto Convert YAML to MRS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 检出仓库代码
      uses: actions/checkout@v4

    - name: 2. 下载 Mihomo 内核
      run: |
        wget -O mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-linux-amd64-compatible-v1.19.24.gz
        gunzip mihomo.gz
        chmod +x mihomo

    - name: 3. 批量下载并转换规则
      run: |
        mkdir -p rules
        
        # 👇【全新配置格式】：原始直链 | 规则行为(domain/ipcidr/classical) | 原文格式(yaml/text) | 输出文件名
        RULES=(
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/self_direct.yaml|domain|yaml|self_direct.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/hsbc_hk_proxy.yaml|domain|yaml|hsbc_hk_proxy.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/hk_banks_direct.yaml|domain|yaml|hk_banks_direct.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/ai.yaml|domain|yaml|ai.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/gemini.yaml|domain|yaml|gemini.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/GoogleCNProxyIP.yaml|ipcidr|yaml|GoogleCNProxyIP.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/UnBan.yaml|domain|yaml|UnBan.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/BanAD.yaml|domain|yaml|BanAD.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/BanProgramAD.yaml|domain|yaml|BanProgramAD.mrs"
          "https://raw.githubusercontent.com/taikwong/clash/refs/heads/main/BanProgramAD_IP.yaml|ipcidr|yaml|BanProgramAD.mrs"
        )

        for RULE in "${RULES[@]}"; do
          # 现在的分割符包含 4 个变量
          IFS='|' read -r URL BEHAVIOR FORMAT FILENAME <<< "$RULE"
          
          echo "========================================="
          echo "🚀 正在处理: $FILENAME (类型: $BEHAVIOR, 格式: $FORMAT)"
          
          # 加入了模拟浏览器的 User-Agent，防止被简单的反爬虫阻断
          if curl --fail -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$URL" -o temp_rule_file; then
            
            # 执行转换，并捕获 Mihomo 内核本身的报错
            if ./mihomo convert-ruleset "$BEHAVIOR" "$FORMAT" temp_rule_file "rules/$FILENAME"; then
               echo "✅ $FILENAME 转换成功！"
            else
               echo "❌ 转换失败：文件内容可能不是合法的 $FORMAT 格式"
               rm -f "rules/$FILENAME" # 转换失败时删除残留的空文件
            fi
            
          else
            echo "❌ 下载失败: $URL"
          fi
          
        done
        
        rm -f temp_rule_file mihomo

        - name: 4. 提交并推送到仓库
          run: |
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add rules/*.mrs
            git commit -m "Auto update MRS rules" || echo "No changes to commit"
            # 👇 新增这一行：在推送前先拉取远程最新代码并变基合并，解决冲突
            git pull --rebase origin main
            git push
